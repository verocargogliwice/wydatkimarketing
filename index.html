/* ══════════════════════════════════════════════════════════════
   GITHUB SYNC — dane trzymane w pliku JSON w prywatnym repo GitHub
   ══════════════════════════════════════════════════════════════ */
const GH_OWNER  = "verocargogliwice";           // <- podmień jeśli repo jest pod innym kontem/organizacją
const GH_REPO   = "wydatkimarketing";           // <- nazwa prywatnego repo z danymi
const GH_PATH   = "dane.json";                  // plik z danymi w tym repo
const GH_BRANCH = "main";
let GH_SHA = null;
let ghStatusText = "Łączenie z GitHub…";
let ghStatusColor = "#888";

function getToken(){return localStorage.getItem("gh_pat")||"";}
function setToken(t){localStorage.setItem("gh_pat",t);}
function ensureToken(){
  let t=getToken();
  if(!t){
    t=prompt("Podaj GitHub Personal Access Token\\n(uprawnienie: Contents – Read and write, tylko do repo "+GH_REPO+"):");
    if(t)setToken(t.trim());
  }
  return getToken();
}
function resetToken(){
  const t=prompt("Podaj nowy GitHub Personal Access Token:",getToken());
  if(t!==null){setToken(t.trim());GH_SHA=null;loadInitial();}
}
function setSaveStatus(text,color){
  ghStatusText=text;ghStatusColor=color||"#888";
  const el=document.getElementById("gh-status");
  if(el){el.textContent=text;el.style.color=color||"#888";}
}

async function ghGetFile(){
  const token=ensureToken();
  if(!token)throw new Error("Brak tokenu GitHub");
  const res=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}?ref=${GH_BRANCH}&_=${Date.now()}`,{
    cache:"no-store",
    headers:{Authorization:`token ${token}`,Accept:"application/vnd.github+json","If-None-Match":""}
  });
  if(res.status===404)return null; // plik jeszcze nie istnieje w repo
  if(res.status===401||res.status===403)throw new Error("Token nieprawidłowy lub brak dostępu do repo (401/403)");
  if(!res.ok)throw new Error("GitHub GET błąd: "+res.status);
  const j=await res.json();
  GH_SHA=j.sha;
  const content=decodeURIComponent(escape(atob(j.content.replace(/\\n/g,""))));
  return JSON.parse(content);
}
async function ghPutFile(dataObj,message){
  const token=ensureToken();
  if(!token)throw new Error("Brak tokenu GitHub");
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(dataObj,null,2))));
  const body={message:message||"Aktualizacja danych z narzędzia budżetowego",content,branch:GH_BRANCH};
  if(GH_SHA)body.sha=GH_SHA;
  const res=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`,{
    method:"PUT",
    headers:{Authorization:`token ${token}`,Accept:"application/vnd.github+json","Content-Type":"application/json"},
    body:JSON.stringify(body)
  });
  if(res.status===409){
    // ktoś inny zapisał w międzyczasie — pobierz świeże sha i spróbuj jeszcze raz
    await ghGetFile();
    return ghPutFile(dataObj,message);
  }
  if(res.status===401||res.status===403)throw new Error("Token nieprawidłowy lub brak dostępu do repo (401/403)");
  if(!res.ok){const t=await res.text();throw new Error("GitHub PUT błąd: "+res.status+" "+t);}
  const j=await res.json();
  GH_SHA=j.content.sha;
  return j;
}

let pushTimer=null;
function pushState(){
  setSaveStatus("Zapisywanie…","#EC5A05");
  clearTimeout(pushTimer);
  pushTimer=setTimeout(async ()=>{
    try{
      await ghPutFile({expenses:S.expenses,plan:PLAN_DATA,lata:LATA_DATA},"Aktualizacja danych – "+new Date().toISOString());
      setSaveStatus("Zapisano ✓","#2A9D8F");
    }catch(e){
      console.error(e);
      setSaveStatus("Błąd zapisu — kliknij, by sprawdzić token","#e63946");
    }
  },500);
}
function save(){pushState();}
function savePlan(){pushState();}
function saveLata(){pushState();}

async function loadInitial(){
  const app=document.getElementById("app");
  app.innerHTML='<div style="padding:60px;text-align:center;color:#888;font-family:Verdana;">Ładowanie danych z GitHub…</div>';
  try{
    const remote=await ghGetFile();
    if(remote){
      S.expenses=remote.expenses||S.expenses;
      PLAN_DATA=remote.plan||PLAN_DATA;
      LATA_DATA=remote.lata||LATA_DATA;
      setSaveStatus("Zapisano ✓","#2A9D8F");
    }else{
      // plik jeszcze nie istnieje w repo — zakładamy go danymi startowymi
      await ghPutFile({expenses:S.expenses,plan:PLAN_DATA,lata:LATA_DATA},"Inicjalizacja pliku danych");
      setSaveStatus("Zapisano ✓","#2A9D8F");
    }
  }catch(e){
    console.error(e);
    app.innerHTML='<div style="padding:60px;text-align:center;color:#e63946;font-family:Verdana;max-width:480px;margin:0 auto;">'
      +'Nie udało się połączyć z GitHub.<br><br><small>'+esc2(e.message)+'</small>'
      +'<br><br><button onclick="resetToken()" style="padding:8px 16px;border:none;border-radius:4px;background:#EC5A05;color:white;cursor:pointer;font-family:Verdana;">Podaj token ponownie</button></div>';
    return;
  }
  render();
}
function esc2(s){return String(s).replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));}
function planBrutto(rok,kat){const p=(PLAN_DATA[rok]||{})[kat];if(!p)return 0;return typeof p==="object"?(p.brutto||0):p;}
function planNetto(rok,kat){const p=(PLAN_DATA[rok]||{})[kat];if(!p)return 0;return typeof p==="object"?(p.netto||0):0;}
function planTotal(rok){return KATEGORIE.filter(k=>k!=="Rezerwa").reduce((s,k)=>s+planNetto(rok,k),0);}
function addYear(){const y=prompt("Podaj rok (np. 2031):");if(y===null)return;const yr=y.trim();if(!/^\d{4}$/.test(yr)){alert("Nieprawid\u0142owy rok");return;}if(LATA_DATA.includes(yr)){alert("Rok ju\u017c istnieje");return;}LATA_DATA.push(yr);LATA_DATA.sort();saveLata();S.rok=yr;render();}

function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function curMonth(){const n=new Date();return MN[n.getMonth()]+" "+n.getFullYear();}
function isRec(typ){return typ===TYPY[1]||typ===TYPY[2];}

/* ── Oblicz pełne miesiące (włącznie z miesiącem od i do) ── */
function calcMonths(from,to){
  if(!from||!to||from>to)return 0;
  const d1=new Date(from),d2=new Date(to);
  return(d2.getFullYear()-d1.getFullYear())*12+(d2.getMonth()-d1.getMonth())+1;
}
function formMonths(){return calcMonths(S.form.dateFrom,S.form.dateTo);}

/* ── Live-update pola z podsumowaniem miesięcznym (bez pełnego render) ── */
function updateMonthDisplay(){
  const months=formMonths();
  const n=parseFloat(S.form.nettoInput)||0;
  const vat=getVat(S.form.vat);
  const el=document.getElementById("f-month-info");
  const bEl=document.getElementById("f-brutto");

  if(S.form.typ===TYPY[1]){
    /* Stały: wpisana kwota = ŁĄCZNA, dzielimy przez miesiące */
    if(el)el.textContent=months>0?`${months} mies. \u2192 ${fP(n/months)}/mies.`:"";
    /* brutto = łączna netto * VAT */
    const newB=n?+(n*(1+vat/100)).toFixed(2):"";
    S.form.brutto=newB;
    if(bEl)bEl.value=newB;
  } else if(S.form.typ===TYPY[2]){
    /* Subskrypcja: wpisana kwota = STAWKA MIESIĘCZNA, mnożymy przez miesiące */
    const total=n*months;
    if(el)el.textContent=months>0?`${months} mies. \u00d7 ${fP(n)} = ${fP(total)} netto`:"";
    const newB=months>0&&n?+(total*(1+vat/100)).toFixed(2):"";
    S.form.brutto=newB;
    if(bEl)bEl.value=newB;
  }
}

/* ── Kalkulacja netto→brutto (formularz) ── */
function calcB(v){
  S.form.nettoInput=v;
  const n=parseFloat(v)||0,vat=getVat(S.form.vat);
  const months=formMonths();
  let b;
  if(S.form.typ===TYPY[2]&&months>0){b=+(n*months*(1+vat/100)).toFixed(2);}
  else{b=n?+(n*(1+vat/100)).toFixed(2):"";}
  S.form.brutto=b;
  const bEl=document.getElementById("f-brutto");if(bEl)bEl.value=b;
  const el=document.getElementById("f-month-info");
  if(el&&months>0){
    if(S.form.typ===TYPY[1])el.textContent=`${months} mies. \u2192 ${fP(n/months)}/mies.`;
    else if(S.form.typ===TYPY[2])el.textContent=`${months} mies. \u00d7 ${fP(n)} = ${fP(n*months)} netto`;
  }
}
function calcN(v){
  S.form.brutto=v;
  const b=parseFloat(v)||0,vat=getVat(S.form.vat);
  const months=formMonths();
  let n;
  if(S.form.typ===TYPY[2]&&months>0){n=b?+(b/months/(1+vat/100)).toFixed(2):"";}
  else{n=b?+(b/(1+vat/100)).toFixed(2):"";}
  S.form.nettoInput=n;
  const nEl=document.getElementById("f-netto");if(nEl)nEl.value=n;
}
function updateVat(v){
  S.form.vat=parseInt(v);
  if(S.form.nettoInput)calcB(S.form.nettoInput);
}
function onTypChange(v){
  S.form.typ=v;
  if(S.form.nettoInput)calcB(S.form.nettoInput);
  render();
}

/* ── Badge dla kolumny Typ w tabeli ── */
function typBadge(e){
  const months=e.months||0;
  const nettoM=e.nettoM||(months>0?+(e.netto/months).toFixed(2):null);
  const title=nettoM?`\u0141\u0105czna: ${fP(e.netto)} | Stawka: ${fP(nettoM)}/mies.`:"";
  if(e.typ===TYPY[1]){
    return`<span style="background:#2A9D8F;color:white;padding:2px 6px;border-radius:3px;font-size:10px;white-space:nowrap;" title="${esc(title)}">Sta\u0142y${months?` \u00b7 ${months}m`:""}</span>`;
  }else if(e.typ===TYPY[2]){
    return`<span style="background:#5856d6;color:white;padding:2px 6px;border-radius:3px;font-size:10px;white-space:nowrap;" title="${esc(title)}">Subskr.${months?` \u00b7 ${months}m`:""}</span>`;

/* ── Filtrowanie i sortowanie ── */
function filtered(){
  const q=(S.search||"").toLowerCase().trim();
  return S.expenses.filter(e=>{
    if(e.rok!==S.rok)return false;
    if(S.filters.from&&e.data<S.filters.from)return false;
    if(S.filters.to&&e.data>S.filters.to)return false;
    if(S.filters.spolka&&e.spolka!==S.filters.spolka)return false;
    if(S.filters.kat&&e.kat!==S.filters.kat)return false;
    if(S.filters.typ&&e.typ!==S.filters.typ)return false;
    if(q&&!e.opis.toLowerCase().includes(q)&&!e.firma.toLowerCase().includes(q))return false;
    return true;
  });
}
function sortedFiltered(){
  let data=filtered();
  if(!S.sort.col)return data;
  return[...data].sort((a,b)=>{
    let va=a[S.sort.col],vb=b[S.sort.col];
    if(typeof va==="string"){va=va.toLowerCase();vb=(vb||"").toLowerCase();}
    else{va=va||0;vb=vb||0;}
    if(va<vb)return S.sort.dir==="asc"?-1:1;
    if(va>vb)return S.sort.dir==="asc"?1:-1;
    return 0;
  });
}
function sortBy(col){
  if(S.sort.col===col)S.sort.dir=S.sort.dir==="asc"?"desc":"asc";
  else{S.sort.col=col;S.sort.dir="asc";}
  render();
}

  charts={};
  document.getElementById("app").innerHTML=layout();
  bindEvents();
  if(S.view==="dashboard")buildCharts();
}

function nav(v){

function editExp(id){
  const e=S.expenses.find(x=>x.id===id);
  if(!e)return;
  /* Dla Subskrypcji przywracamy stawkę miesięczną; dla reszty łączną */
  const nettoInput=(e.typ===TYPY[2]&&e.nettoM)?e.nettoM:e.netto;
  S.form={data:e.data,opis:e.opis,firma:e.firma,spolka:e.spolka,kat:e.kat,
    typ:e.typ,vat:getVat(e.vat),nettoInput:nettoInput,brutto:e.brutto,nr:e.nr||"",
    dateFrom:e.dateFrom||"",dateTo:e.dateTo||""};
  S.editId=id;S.view="dodaj";render();
}

function saveEntry(f,existingId){
  const months=isRec(f.typ)?calcMonths(f.dateFrom,f.dateTo):0;
  const vat=getVat(f.vat);
  const ni=parseFloat(f.nettoInput)||0;
  let netto,nettoM;
  if(f.typ===TYPY[2]&&months>0){
    nettoM=ni;netto=+(ni*months).toFixed(2);
  } else {
    netto=ni;nettoM=months>0?+(ni/months).toFixed(2):null;
  }
  const brutto=parseFloat(f.brutto)||+(netto*(1+vat/100)).toFixed(2);
  return{
    id:existingId||Date.now(),rok:f.data.slice(0,4),data:f.data,
    opis:f.opis,firma:f.firma,spolka:f.spolka,kat:f.kat,typ:f.typ,
    vat:vat,netto:netto,nettoM:nettoM||undefined,brutto:brutto,nr:f.nr||"",
    dateFrom:f.dateFrom||undefined,dateTo:f.dateTo||undefined,
    months:months||undefined
  };
}

function addExp(){
  const f=S.form;
  if(!f.opis||!f.firma||!f.nettoInput){alert("Uzupe\u0142nij: opis, firma, netto");return;}
  if(isRec(f.typ)&&(!f.dateFrom||!f.dateTo)){alert("Wybierz zakres dat dla tego typu wydatku");return;}
  S.expenses.unshift(saveEntry(f,null));
  save();S.view="lista";render();
}

function updateExp(){
  const f=S.form;
  if(!f.opis||!f.firma||!f.nettoInput){alert("Uzupe\u0142nij: opis, firma, netto");return;}
  if(isRec(f.typ)&&(!f.dateFrom||!f.dateTo)){alert("Wybierz zakres dat dla tego typu wydatku");return;}
  const idx=S.expenses.findIndex(e=>e.id===S.editId);
  if(idx===-1)return;
  S.expenses[idx]=saveEntry(f,S.editId);
  S.editId=null;save();S.view="lista";render();
}

function calcB(v){
  S.form.nettoInput=v;
  const n=parseFloat(v)||0,vat=getVat(S.form.vat),months=formMonths();
  let b;
  if(S.form.typ===TYPY[2]&&months>0)b=+(n*months*(1+vat/100)).toFixed(2);
  else b=n?+(n*(1+vat/100)).toFixed(2):"";
  S.form.brutto=b;
  const bEl=document.getElementById("f-brutto");if(bEl)bEl.value=b;
  const el=document.getElementById("f-month-info");
  if(el&&months>0){
    if(S.form.typ===TYPY[1])el.textContent=`${months} mies. \u2192 ${fP(n/months)}/mies.`;
    else if(S.form.typ===TYPY[2])el.textContent=`${months} mies. \u00d7 ${fP(n)} = ${fP(n*months)} netto`;
  }
}
function calcN(v){
  S.form.brutto=v;
  const b=parseFloat(v)||0,vat=getVat(S.form.vat),months=formMonths();
  let n;
  if(S.form.typ===TYPY[2]&&months>0)n=b?+(b/months/(1+vat/100)).toFixed(2):"";
  else n=b?+(b/(1+vat/100)).toFixed(2):"";
  S.form.nettoInput=n;
  const nEl=document.getElementById("f-netto");if(nEl)nEl.value=n;
}
function updateVat(v){S.form.vat=parseInt(v);if(S.form.nettoInput)calcB(S.form.nettoInput);}

      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      wrap.appendChild(cv);document.body.appendChild(wrap);
      const ch=new Chart(cv,cfg);
      await new Promise(r=>setTimeout(r,150));
      const b64=cv.toDataURL('image/png').split(',')[1];
      ch.destroy();document.body.removeChild(wrap);
      return b64;
    }

    const katOK=KATEGORIE.filter(k=>byK[k]>0);

    const piePng=await genPng({
      type:'doughnut',
      data:{labels:katOK,datasets:[{data:katOK.map(k=>+byK[k].toFixed(2)),
        backgroundColor:CLR,borderWidth:3,borderColor:'#ffffff'}]},
      options:{responsive:false,animation:false,
        plugins:{
          legend:{position:'bottom',labels:{font:{size:14,family:'Verdana'},
            padding:16,boxWidth:16}},
          title:{display:true,
            text:['Podzia\u0142 wydatk\u00f3w netto \u2014 '+S.rok],
            font:{size:15,family:'Verdana',weight:'bold'},
            color:'#1A1A1A',padding:{bottom:16,top:8}}}}
    },700,480);

    const planKat=KATEGORIE.filter(k=>planBrutto(S.rok,k)>0);
    const barPng=await genPng({
      type:'bar',
      data:{labels:planKat,
        datasets:[
          {label:'Wykonanie',data:planKat.map(k=>+exp.filter(e=>e.kat===k).reduce((s,e)=>s+e.netto,0).toFixed(0)),
            backgroundColor:'#EC5A05',borderRadius:4},
          {label:'Plan FC'+S.rok.slice(2),data:planKat.map(k=>planNetto(S.rok,k)),
            backgroundColor:'#DDDDDD',borderRadius:4}
        ]},
      options:{responsive:false,animation:false,indexAxis:'y',
        plugins:{
          legend:{position:'top',labels:{font:{size:13,family:'Verdana'},padding:16,boxWidth:14}},
          title:{display:true,
            text:['% realizacji bud\u017cetu FC'+S.rok.slice(2),' Og\u00f3\u0142em: '+pct.toFixed(1)+'%  |  Wydano: '+new Intl.NumberFormat('pl-PL',{style:'currency',currency:'PLN',maximumFractionDigits:0}).format(tN)+' z '+new Intl.NumberFormat('pl-PL',{style:'currency',currency:'PLN',maximumFractionDigits:0}).format(tPlan)],
            font:{size:14,family:'Verdana',weight:'bold'},color:'#1A1A1A',padding:{bottom:12,top:8}}},
        scales:{
          x:{grid:{color:'#eeeeee'},
            ticks:{font:{size:11,family:'Verdana'},callback:v=>(v>=1000?Math.round(v/1000)+'k':v)+' z\u0142'}},
          y:{grid:{display:false},ticks:{font:{size:12,family:'Verdana'}}}}}
    },720,460);

    /* ---- helpers kolorow (ARGB) ---- */
    const C={
      OR:'FFEC5A05', DK:'FF1A1A1A', WH:'FFFFFFFF',
      GR:'FF2A9D8F', RD:'FFE74C3C', PU:'FF5856D6',
      BGO:'FFFDE8D8', BGL:'FFF8F8F8', BGG:'FFE8F7F4',
      BLP:'FFF0EFFE', MG:'FFE0E0E0', LB:'FFEEEEEE'
    };
    function fill(argb){return{type:'pattern',pattern:'solid',fgColor:{argb:argb}};}
    function font(argb,sz,bold){return{name:'Verdana',size:sz||10,bold:!!bold,color:{argb:argb||C.DK}};}
    function aln(h,v,wrap){return{horizontal:h||'left',vertical:v||'middle',wrapText:!!wrap,indent:h==='left'?1:0};}
    function brd(col){const s={style:'thin',color:{argb:col||'FFE0E0E0'}};return{top:s,bottom:s,left:s,right:s};}
    function thickBot(col){return{top:{style:'thin',color:{argb:'FFE8E8E8'}},bottom:{style:'medium',color:{argb:col||C.OR}},left:{style:'thin',color:{argb:'FFE8E8E8'}},right:{style:'thin',color:{argb:'FFE8E8E8'}}}}

    function setCell(ws,addr,val,fillArg,fontArg,alnArg,brdArg,numFmt){
      const c=ws.getCell(addr);
      if(val!==undefined)c.value=val;
      if(fillArg)c.fill=fill(fillArg);
      if(fontArg)c.font=fontArg;
      if(alnArg)c.alignment=alnArg;
      if(brdArg)c.border=brdArg;
      if(numFmt)c.numFmt=numFmt;
      return c;
    }

    /* ======================================
       WORKBOOK
    ====================================== */
    const wb=new ExcelJS.Workbook();
    wb.creator='Marek Bodynek';
    wb.created=new Date();

    /* ======================================
       ARKUSZ 1 — DASHBOARD
       Layout (landscape):
       Kol: A(2) B(24) C(20) D(20) E(20) F(2) G(24) H(20) I(20) J(20) K(2)
       = 11 kolumn
    ====================================== */
    const dash=wb.addWorksheet('Dashboard',{
      pageSetup:{paperSize:9,orientation:'landscape',fitToPage:true,fitToWidth:1,fitToHeight:0}
    });
    dash.columns=[
      {width:2},{width:24},{width:20},{width:20},{width:20},
      {width:2},
      {width:24},{width:20},{width:20},{width:20},
      {width:2}
    ];

    /* -- R1: Naglowek glowny -- */
    dash.getRow(1).height=48;
    dash.mergeCells('A1:K1');
    setCell(dash,'A1','verocargo \u2014 Raport Wydatk\u00f3w Marketing '+S.rok,
      C.OR, font(C.WH,22,true), aln('center','middle'), null);

    /* -- R2: Meta -- */
    dash.getRow(2).height=16;
    dash.mergeCells('A2:K2');
    setCell(dash,'A2',
      'Wygenerowano: '+new Date().toLocaleDateString('pl-PL',{day:'2-digit',month:'long',year:'numeric'})+
      '   |   Opracowa\u0142: Marek Bodynek   |   verocargo Sp. z o.o.',
      'FF2A2A2A', font('FF999999',9,false), aln('center','middle'));

    /* -- R3: Separator -- */
    dash.getRow(3).height=6;

    /* -- R4-R7: KPI boxes (2 lewe + 2 prawe) -- */
    function kpi(ws,rc,label,val,fmt,sub,bgArg,acArg){
      const [r,c]=rc;
      ws.getRow(r).height=14;ws.getRow(r+1).height=42;ws.getRow(r+2).height=16;ws.getRow(r+3).height=6;
      const mc1=`${c}${r}:${String.fromCharCode(c.charCodeAt(0)+1)}${r}`;ws.mergeCells(mc1);
      setCell(ws,`${c}${r}`,label,bgArg,font(acArg,9,true),aln('center','middle'),brd('FFD0D0D0'));
      const mc2=`${c}${r+1}:${String.fromCharCode(c.charCodeAt(0)+1)}${r+1}`;ws.mergeCells(mc2);
      const vc=setCell(ws,`${c}${r+1}`,val,bgArg,font(acArg,22,true),aln('center','middle'),thickBot(acArg),fmt);
      const mc3=`${c}${r+2}:${String.fromCharCode(c.charCodeAt(0)+1)}${r+2}`;ws.mergeCells(mc3);
      setCell(ws,`${c}${r+2}`,sub,bgArg,font('FF999999',8,false),aln('center','middle'),brd('FFD0D0D0'));
    }

    kpi(dash,[4,'B'],'BRUTTO \u0141\u0104CZNIE',tB,'#,##0.00 "z\u0142"',exp.length+' pozycji',C.BGO,C.OR);
    kpi(dash,[4,'D'],'NETTO \u0141\u0104CZNIE',tN,'#,##0.00 "z\u0142"','warto\u015b\u0107 netto',C.BGL,C.DK);
    kpi(dash,[4,'G'],'REALIZACJA FC'+S.rok.slice(2),pct/100,'0.0%',
      'Wydano '+fP(tB)+' / Plan '+fP(tPlan),C.BGG,pct>90?C.RD:C.GR);
    kpi(dash,[4,'I'],'BIE\u017b\u0104CY MIESI\u0104C',thisM,'#,##0.00 "z\u0142"',mLabel+' \u2013 bez sta\u0142ych/subskrypcji',C.BLP,C.PU);

    /* -- R9: Naglowek sekcji wykresow -- */
    dash.getRow(9).height=22;
    dash.mergeCells('A9:E9');
    setCell(dash,'A9','\ud83c\udf65 Podzia\u0142 kategorii',C.DK,font(C.WH,11,true),aln('left','middle'));
    dash.mergeCells('G9:K9');
    setCell(dash,'G9','\ud83d\udcca Realizacja bud\u017cetu FC'+S.rok.slice(2),C.DK,font(C.WH,11,true),aln('left','middle'));

    /* -- R10-R29: Wykresy PNG -- */
    for(let r=10;r<=29;r++){dash.getRow(r).height=18;}

    const pieId=wb.addImage({base64:piePng,extension:'png'});
    const barId=wb.addImage({base64:barPng,extension:'png'});

    /* tl+br: col i row sa 0-indexed (A=0, B=1..., row1=0, row10=9) */
    dash.addImage(pieId,{tl:{col:1,row:9},br:{col:5,row:29},editAs:'oneCell'});
    dash.addImage(barId,{tl:{col:6,row:9},br:{col:11,row:29},editAs:'oneCell'});

    /* -- R30: Separator -- */
    dash.getRow(30).height=8;

    /* -- R31: Naglowek tabeli kategorii -- */
    dash.getRow(31).height=26;
    dash.mergeCells('A31:K31');
    setCell(dash,'A31','\ud83d\udcc1 Szczeg\u00f3\u0142owy podzia\u0142 wg kategorii \u2014 '+S.rok,
      C.DK,font(C.WH,12,true),aln('left','middle'));

    /* -- R32: Naglowki tabeli -- */
    dash.getRow(32).height=20;
    const tHdrs=['Kategoria','Brutto (z\u0142)','Netto (z\u0142)','% ca\u0142o\u015bci','Plan FC'+S.rok.slice(2)+' (z\u0142)','Wykonanie %','Pozosta\u0142o (z\u0142)'];
    const tCols=['B','C','D','E','G','H','I'];
    tHdrs.forEach((h,i)=>{
      setCell(dash,tCols[i]+'32',h,C.OR,font(C.WH,10,true),aln(i===0?'left':'center','middle'),brd(C.OR));
    });

    /* -- R33+: Dane kategorii -- */
    let ri=33;
    KATEGORIE.forEach((k,ki)=>{
      const kb=exp.filter(e=>e.kat===k).reduce((s,e)=>s+e.brutto,0);
      const kn=exp.filter(e=>e.kat===k).reduce((s,e)=>s+e.netto,0);
      if(kb===0)return;
      const kpl=planNetto(S.rok,k);
      const kpp=kpl>0?kn/kpl:null;
      const krem=kpl>0?kpl-kn:null;
      const bg=ki%2===0?C.BGL:C.WH;
      dash.getRow(ri).height=17;
      setCell(dash,'B'+ri,k,bg,font(C.DK,11,true),aln('left','middle',true),brd(C.LB));
      setCell(dash,'C'+ri,kb,bg,font(C.OR,11,true),aln('right','middle'),brd(C.LB),'#,##0.00');
      setCell(dash,'D'+ri,kn,bg,font(C.DK,10,false),aln('right','middle'),brd(C.LB),'#,##0.00');
      setCell(dash,'E'+ri,tN>0?kn/tN:0,bg,font(C.DK,10,false),aln('center','middle'),brd(C.LB),'0.0%');
      setCell(dash,'G'+ri,kpl||'\u2014',bg,font('FF666666',10,false),aln('right','middle'),brd(C.LB),kpl?'#,##0.00':'');
      if(kpp!==null){
        const fc=kpp>0.9?C.RD:(kpp>=0.5?C.GR:C.OR);
        setCell(dash,'H'+ri,kpp,bg,font(fc,11,true),aln('center','middle'),brd(C.LB),'0.0%');
        setCell(dash,'I'+ri,krem,bg,font(krem<0?C.RD:C.GR,10,true),aln('right','middle'),brd(C.LB),'#,##0.00');
      }else{
        setCell(dash,'H'+ri,'\u2014',bg,font('FFAAAAAA',10),aln('center','middle'),brd(C.LB));
        setCell(dash,'I'+ri,'\u2014',bg,font('FFAAAAAA',10),aln('center','middle'),brd(C.LB));
      }
      ri++;
    });

    /* -- Wiersz SUMA -- */
    dash.getRow(ri).height=22;
    const sumB2=KATEGORIE.reduce((s,k)=>{const kb=exp.filter(e=>e.kat===k).reduce((ss,e)=>ss+e.brutto,0);return s+kb;},0);
    const sumN2=KATEGORIE.reduce((s,k)=>{const kn=exp.filter(e=>e.kat===k).reduce((ss,e)=>ss+e.netto,0);return s+kn;},0);
    setCell(dash,'B'+ri,'\u0141\u0104CZNIE',C.DK,font(C.WH,11,true),aln('left','middle'));
    setCell(dash,'C'+ri,sumB2,C.DK,font(C.WH,12,true),aln('right','middle'),null,'#,##0.00');
    setCell(dash,'D'+ri,sumN2,C.DK,font(C.WH,11,true),aln('right','middle'),null,'#,##0.00');
    setCell(dash,'E'+ri,1,C.DK,font(C.WH,11,true),aln('center','middle'),null,'0.0%');
    if(tPlan>0){
      setCell(dash,'G'+ri,tPlan,C.DK,font(C.WH,11,true),aln('right','middle'),null,'#,##0.00');
      setCell(dash,'H'+ri,pct/100,C.DK,font(pct>90?C.RD:C.GR,12,true),aln('center','middle'),null,'0.0%');
      setCell(dash,'I'+ri,tPlan-sumN2,C.DK,font(tPlan-sumN2<0?C.RD:C.GR,11,true),aln('right','middle'),null,'#,##0.00');
    }

    /* ======================================
       ARKUSZ 2 — WYDATKI
    ====================================== */
    const wsE=wb.addWorksheet('Wydatki');
    wsE.columns=[
      {header:'Data',key:'data',width:13},
      {header:'Nr faktury',key:'nr',width:15},
      {header:'Opis',key:'opis',width:40},
      {header:'Firma',key:'firma',width:30},
      {header:'Sp\u00f3\u0142ka',key:'spolka',width:8},
      {header:'Kategoria',key:'kat',width:13},
      {header:'Typ',key:'typ',width:14},
      {header:'Data od',key:'dateFrom',width:12},
      {header:'Data do',key:'dateTo',width:12},
      {header:'Mies.',key:'months',width:7},
      {header:'Netto (z\u0142)',key:'netto',width:14},
      {header:'Brutto (z\u0142)',key:'brutto',width:14}
    ];
    const eHdr=wsE.getRow(1);
    eHdr.height=22;
    eHdr.eachCell(c=>{
      c.fill=fill(C.OR);c.font=font(C.WH,10,true);
      c.alignment=aln('center','middle');c.border=brd(C.OR);
    });
    exp.forEach((e,i)=>{
      wsE.addRow({data:e.data,nr:e.nr||'',opis:e.opis,firma:e.firma,
        spolka:e.spolka.includes('power')?'power':'vero',
        kat:e.kat,typ:e.typ,dateFrom:e.dateFrom||'',dateTo:e.dateTo||'',
        months:e.months||'',netto:e.netto,brutto:e.brutto});
      const r=wsE.getRow(i+2);r.height=15;
      const bg=i%2===0?C.WH:C.BGL;
      r.eachCell((c,cn)=>{
        c.fill=fill(bg);
        c.font={name:'Verdana',size:10,bold:cn===12};
        c.alignment={horizontal:cn>=11?'right':'left',vertical:'middle'};
        c.border={bottom:{style:'thin',color:{argb:C.LB}}};
        if(cn>=11)c.numFmt='#,##0.00';
      });
    });
    wsE.views=[{state:'frozen',ySplit:1}];
    wsE.autoFilter={from:'A1',to:'L1'};

    /* ======================================
       ARKUSZ 3 — PLAN VS REALIZACJA
    ====================================== */
    const wsP=wb.addWorksheet('Plan vs Realizacja',{
      pageSetup:{paperSize:9,orientation:'landscape',fitToPage:true,fitToWidth:1,fitToHeight:0}
    });
    wsP.columns=[
      {width:32},
      {width:22},
      {width:22},
      {width:16},
      {width:22}
    ];
    wsP.views=[{state:'frozen',ySplit:2}];

    /* R1: Tytul */
    wsP.getRow(1).height=46;
    wsP.mergeCells('A1:E1');
    const wsPt=wsP.getCell('A1');
    wsPt.value='Plan vs Realizacja FC'+S.rok.slice(2)+' — Marketing verocargo';
    wsPt.fill=fill(C.OR);wsPt.font=font(C.WH,16,true);
    wsPt.alignment=aln('center','middle');

    /* R2: Naglowki */
    wsP.getRow(2).height=24;
    ['Kategoria','Plan netto (zł)','Wykonanie netto (zł)','% planu','Pozostało (zł)'].forEach((h,i)=>{
      const c=wsP.getRow(2).getCell(i+1);
      c.value=h;c.fill=fill(C.DK);c.font=font(C.WH,11,true);
      c.alignment=aln(i===0?'left':'center','middle');c.border=brd(C.DK);
    });

    /* R3+: Dane */
    let pri=3;
    const allYP=S.expenses.filter(e=>e.rok===S.rok);
    KATEGORIE.forEach((k,ki)=>{
      const pk=planNetto(S.rok,k);
      const sk=allYP.filter(e=>e.kat===k).reduce((s,e)=>s+e.netto,0);
      const pp=pk>0?sk/pk:null;
      const rem=pk>0?pk-sk:null;
      const bg=ki%2===0?C.BGL:C.WH;
      wsP.getRow(pri).height=22;
      const r=wsP.getRow(pri);

      const c1=r.getCell(1);c1.value=k;c1.fill=fill(bg);c1.font=font(C.DK,12,true);
      c1.alignment=aln('left','middle');c1.border=brd(C.LB);

      const c2=r.getCell(2);
      if(pk){c2.value=pk;c2.numFmt='#,##0.00';}else{c2.value='—';}
      c2.fill=fill(bg);c2.font=font('FF555555',12,false);
      c2.alignment=aln('right','middle');c2.border=brd(C.LB);

      const c3=r.getCell(3);c3.value=sk;c3.numFmt='#,##0.00';
      c3.fill=fill(bg);c3.font=font(C.OR,12,true);
      c3.alignment=aln('right','middle');c3.border=brd(C.LB);

      if(pp!==null){
        const pc=pp>0.9?C.RD:(pp>=0.5?C.GR:C.OR);
        const c4=r.getCell(4);c4.value=pp;c4.numFmt='0.0%';
        c4.fill=fill(pp>0.9?'FFFFE8E8':(pp>=0.5?'FFE8FFF2':'FFFFFCE8'));
        c4.font=font(pc,13,true);c4.alignment=aln('center','middle');c4.border=brd(C.LB);

        const c5=r.getCell(5);c5.value=rem;c5.numFmt='#,##0.00';
        c5.fill=fill(bg);c5.font=font(rem<0?C.RD:C.GR,12,true);
        c5.alignment=aln('right','middle');c5.border=brd(C.LB);
      }else{
        [4,5].forEach(ci=>{
          const cx=r.getCell(ci);cx.value='—';cx.fill=fill(bg);
          cx.font=font('FFBBBBBB',12);cx.alignment=aln('center','middle');cx.border=brd(C.LB);
        });
      }
      pri++;
    });

    /* Separator */
    wsP.getRow(pri).height=8;
    wsP.mergeCells('A'+pri+':E'+pri);
    wsP.getCell('A'+pri).fill=fill('FFDDDDDD');
    pri++;

    /* Wiersz SUMA */
    wsP.getRow(pri).height=28;
    const totSpent=tNbud;

    const ps1=wsP.getRow(pri).getCell(1);
    ps1.value='ŁĄCZNIE';ps1.fill=fill(C.DK);ps1.font=font(C.WH,13,true);
    ps1.alignment=aln('left','middle');ps1.border=brd(C.DK);

    const ps2=wsP.getRow(pri).getCell(2);
    if(tPlan>0){ps2.value=tPlan;ps2.numFmt='#,##0.00';}else{ps2.value='—';}
    ps2.fill=fill(C.DK);ps2.font=font(C.WH,13,true);
    ps2.alignment=aln('right','middle');ps2.border=brd(C.DK);

    const ps3=wsP.getRow(pri).getCell(3);
    ps3.value=totSpent;ps3.numFmt='#,##0.00';
    ps3.fill=fill(C.DK);ps3.font=font(C.WH,13,true);
    ps3.alignment=aln('right','middle');ps3.border=brd(C.DK);

    const ps4=wsP.getRow(pri).getCell(4);
    if(tPlan>0){ps4.value=pct/100;ps4.numFmt='0.0%';}else{ps4.value='—';}
    ps4.fill=fill(C.DK);
    ps4.font=font(tPlan>0&&pct>90?C.RD:C.GR,14,true);
    ps4.alignment=aln('center','middle');ps4.border=brd(C.DK);

    const ps5=wsP.getRow(pri).getCell(5);
    if(tPlan>0){ps5.value=tPlan-totSpent;ps5.numFmt='#,##0.00';}else{ps5.value='—';}
    ps5.fill=fill(C.DK);
    ps5.font=font(tPlan>0&&tPlan-totSpent<0?C.RD:C.GR,13,true);
    ps5.alignment=aln('right','middle');ps5.border=brd(C.DK);

    /* ======== GENERUJ I POBIERZ ======== */
    const buffer=await wb.xlsx.writeBuffer();
    const blob=new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='Wydatki_Marketing_'+S.rok+'_'+td().replace(/-/g,'')+'.xlsx';
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);URL.revokeObjectURL(a.href);

  }catch(err){
    console.error('Export error:',err);
    alert('B\u0142\u0105d eksportu: '+err.message+'\n\nSprawdz konsol\u0119 przegladarki (F12).');
  }finally{
    if(btn){btn.innerHTML='\u2193 Eksport Excel';btn.disabled=false;}
  }
}

function bindEvents(){}
loadInitial();
</script>
